<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./public/css/style.css">
    <script src="https://kit.fontawesome.com/754a3808be.js" crossorigin="anonymous"></script>
    <title>Document</title>
</head>

<body>
<!-- !this is header -->
    <header>
        <h1><i class="fa-solid fa-list-check li"></i> To Do List</h1>
        <p>Stay organized and productive</p>
    </header>

    <main>
<!-- !this is form -->
        <form class="add-task">
            <input type="text" placeholder="Enter a new task...">
            <button type="submit">Add Task</button>
        </form>
        <p class="error"></p>
        <section class="stats">
            <div class="card">
                <h3><i class="fa-solid fa-list color"></i> Total</h3>
                <!--  -->
                <p id="total">0</p>
            </div>
            <div class="card">
                <h3><i class="fa-regular fa-calendar-check color"></i> Completed</h3>
                <p id="completed">0</p>
            </div>
            <div class="card">
                <h3><i class="fa-regular fa-clock color"></i> Remaining</h3>
                <p id="remaining">0</p>
            </div>
        </section>
        <section class="tasks">
            <h2><i class="fa-solid fa-list table"></i> All Tasks</h2>
            <ul></ul>

        </section>
    </main>
<!-- !this is footer -->
    <footer>
        <p><i class="fa-solid fa-heart color"></i> Stay focused and keep going!</p>
    </footer>
    <script src="./public/js/script.js"></script>
</body>

</html>
